name: mvae-env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - numpy
  - scipy=1.13.1
  - matplotlib
  - jupyter
  - geomstats
  - plotly
  - scikit-image
  - tqdm
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch
      - torchvision
      - torchaudio
      - git+https://github.com/geoopt/geoopt.git
      - torch-topological
      - giotto-tda
variables:
  GEOMSTATS_BACKEND: "pytorch"

# update environment after changes:
# conda env update --file conda-env.yaml --prune