name: mvae-env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pytorch
  - torchvision
  - numpy
  - scipy
  - matplotlib
  - jupyter
  - geomstats
  - wandb
  - plotly
  - pip
  - pip:
      - git+https://github.com/geoopt/geoopt.git
variables:
  GEOMSTATS_BACKEND: numpy

# update environment after changes:
# conda env update --file conda-env.yaml --prune